<!DOCTYPE html>
<html>
<head>
    <title>Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Historique</h1>

    <table>

        <tr>
            <th>Utilisateur</th>
            <th>Action</th>
        </tr>

        {% for log in logs %}

        <tr>
            <td>{{ log.username }}</td>
            <td>{{ log.action }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
