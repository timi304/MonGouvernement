<!DOCTYPE html>
<html>
<head>
    <title>Annonces</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Annonces gouvernementales</h1>

    {% for a in announcements %}

    <div class="card">

        <h2>{{ a.title }}</h2>

        <p>{{ a.content }}</p>

        <small>
            {{ a.visibility }}
        </small>

    </div>

    {% endfor %}

</div>

</body>
</html>
